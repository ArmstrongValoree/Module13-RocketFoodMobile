# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# JWT
app.jwt.secret=${APP_JWT_SECRET}

# CORS — comma-separated allowed origins (e.g. Expo web build URL)
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:8081}

# Twilio (optional — SMS order notifications)
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}

# Notify.EU (optional — email order notifications)
notify.secret.key=${NOTIFY_SECRET_KEY:}
notify.client.id=${NOTIFY_CLIENT_ID:}
notify.template.id=${NOTIFY_TEMPLATE_ID:}

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
