# Database Configuration
# The URL to connect to the MySQL database located on localhost at port 3306, using the database named 'rdelivery'
spring.datasource.url = jdbc:mysql://localhost:3306/rdelivery

# The username to connect to the database
spring.datasource.username = root

# The password to connect to the database (leave it empty if there's no password)
spring.datasource.password =${DB_PASSWORD:#VA10r33}

# For H2 (in-memory database)
spring.h2.console.enabled=true

# The driver class name for MySQL database connection
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver

# JPA and Hibernate Configuration
# Automatically update the database schema when the application starts
spring.jpa.hibernate.ddl-auto = update

# Show SQL queries in the logs
spring.jpa.show-sql = true

# Hibernate-specific settings
# Drop and create the database schema on startup
hibernate.hbm2ddl.auto = create-drop

# Show SQL queries in the logs (Hibernate specific)
hibernate.show_sql = true

# Specify the SQL dialect for MySQL
spring.jpa.database-platform = org.hibernate.dialect.MySQLDialect

# Thymeleaf Configuration
# Disable template caching to allow real-time changes in development
spring.thymeleaf.cache = false

# Application-specific Configuration
# Secret key for JWT token generation
app.jwt.secret = !*jwtToken*!



# Spring Profile Configuration
# Uncomment to seed the database upon startup with specific data
# Note: 'manual-seeding' should be defined as a profile with specific settings for seeding
spring.profiles.active = manual-seeding



# Enable or disable automatic restart
spring.devtools.restart.enabled=true

# Specify directories to watch for changes (defaults to 'src/main/resources' and 'target/classes')
spring.devtools.restart.additional-paths=src/main/java

# Exclude specific file patterns from triggering a restart
spring.devtools.restart.exclude=**/*.xml,**/*.properties

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Twilio Configuration
# Twilio account SID (used for SMS sending)
twilio.account.sid = ${TWILIO_ACCOUNT_SID:your_twilio_account_sid}

# Twilio authentication token
twilio.auth.token = ${TWILIO_AUTH_TOKEN:your_twilio_auth_token}

# Twilio phone number to send SMS from
twilio.phone.number = your_twilio_phone_number

# Notify.EU Configuration
# Secret key for Notify.EU API access
notify.secret.key = your_notify_secret_key

# Client ID for Notify.EU API access
notify.client.id = your_notify_client_id 

# Template ID for the email notification
notify.template.id = your_notify_template_id